site_name: pfind
site_description: Find files by describing them in natural language, with the generated filter sandboxed in Docker
site_url: https://deeplook.github.io/pfind
repo_url: https://github.com/deeplook/pfind
repo_name: deeplook/pfind

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - CLI Reference: cli.md
  - Examples: examples.md
  - Output Modes: output-modes.md
  - Dependencies: dependencies.md
  - Runtimes: runtimes.md
  - macOS Metadata: macos-metadata.md
  - How pfind Compares: comparison.md
  - Safety Model: safety.md
  - Python API: api.md
  - Troubleshooting: troubleshooting.md

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
      # GitHub-compatible heading slugs so the docs' relative anchors (authored for
      # GitHub rendering, e.g. "#saving--replaying-filters") resolve here too.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
