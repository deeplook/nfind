name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Check formatting (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

  test:
    # Run the suite on Linux and Windows so the host-side code (path handling,
    # subprocess/Docker invocation, config/cache locations) is verified on both.
    # The Docker integration tests self-skip where no Linux Docker daemon is
    # reachable (Windows runners), so they exercise the real container path on
    # Linux and the host logic everywhere.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Required by tests/test_worker_node.py: those tests run the Node.js worker
      # (src/nfind/worker_node.cjs) through a real `node` process and skip when node
      # is absent, so without this step they would be silently skipped rather than run.
      # (nfind's own node *runtime* runs inside Docker, so end users don't need node
      # locally -- this is a dev/CI requirement only.)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest
