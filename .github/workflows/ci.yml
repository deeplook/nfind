name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every Python version the package claims to support (pyproject classifiers,
        # requires-python = ">=3.11").
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Required by tests/test_worker_node.py: those tests run the Node.js worker
      # (src/nfind/worker_node.cjs) through a real `node` process. Without this they
      # would be silently skipped. nfind's own node runtime runs inside Docker, so
      # end users don't need node locally — this is a dev/CI requirement only.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Check formatting (ruff)
        run: uv run ruff format --check src tests

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest --cov=src --cov-report=xml

  test-nerdctl:
    # Validate the experimental nerdctl backend against a real, rootful containerd. The
    # main `test` job skips the nerdctl integration cases because nerdctl is not installed
    # there; this job installs the nerdctl-full bundle (nerdctl + buildkit + CNI) so those
    # cases actually run end-to-end (image build + hardened container run). containerd is
    # already present on the runner. nerdctl treats any non-root invocation as rootless
    # (there is no rootful-as-non-root override), and nfind's rootless nerdctl path has a
    # documented mount caveat, so we drive nerdctl as root to exercise the rootful happy
    # path against the system containerd.
    runs-on: ubuntu-latest
    env:
      NERDCTL_VERSION: "2.3.4"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Install nerdctl + buildkit (full bundle, minus its containerd)
        run: |
          set -eux
          curl -fsSL -o /tmp/nerdctl-full.tgz \
            "https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-full-${NERDCTL_VERSION}-linux-amd64.tar.gz"
          sudo tar -C /usr/local -xzf /tmp/nerdctl-full.tgz
          # The bundle ships its own containerd + runc shim; on PATH they shadow the system
          # containerd that both docker and nerdctl actually talk to, and the newer shim is
          # incompatible with the running daemon (TTRPC "unsupported protocol" at task
          # start). Keep only the client/build tools and let the system containerd (and its
          # matching shim) serve the containers.
          sudo rm -f /usr/local/bin/containerd \
                     /usr/local/bin/containerd-shim \
                     /usr/local/bin/containerd-shim-runc-v1 \
                     /usr/local/bin/containerd-shim-runc-v2 \
                     /usr/local/bin/ctr

      - name: Start buildkit (rootful)
        run: |
          set -eux
          sudo systemctl daemon-reload
          # containerd already runs on the runner; nerdctl build needs buildkit too.
          sudo systemctl enable --now buildkit

      - name: Smoke-test nerdctl (rootful)
        run: sudo "$(command -v nerdctl)" info

      - name: Integration tests (real rootful containerd via nerdctl)
        run: |
          set -eux
          # Run as root so nerdctl uses the system (rootful) containerd. Use a
          # world-traversable basetemp (umask 022 -> 0755 dirs, 0644 files) so the
          # container's non-root worker (uid 10001) can read the bind-mounted search tree,
          # rather than pytest's default 0700 pytest-of-root base.
          sudo mkdir -p /tmp/nfind-ci
          sudo chmod 0755 /tmp/nfind-ci
          sudo -E env "PATH=$PATH" "$(command -v uv)" run pytest \
            tests/test_cli_integration.py -m integration -k real_backend \
            --basetemp=/tmp/nfind-ci

  test-windows:
    # Verify host-side path handling and subprocess/config logic on Windows. When Docker
    # is available on the runner, the real sandbox container integration tests run here
    # too; otherwise they self-skip and this job still covers the non-container paths.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest --cov=src --cov-report=xml
