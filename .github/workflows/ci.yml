name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every Python version the package claims to support (pyproject classifiers,
        # requires-python = ">=3.11").
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Required by tests/test_worker_node.py: those tests run the Node.js worker
      # (src/nfind/worker_node.cjs) through a real `node` process. Without this they
      # would be silently skipped. nfind's own node runtime runs inside Docker, so
      # end users don't need node locally — this is a dev/CI requirement only.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Check formatting (ruff)
        run: uv run ruff format --check src tests

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test
        run: uv run pytest --cov=src --cov-report=xml

  test-windows:
    # Verify host-side path handling and subprocess/config logic on Windows. The Docker
    # integration tests self-skip where no Linux daemon is reachable, so the focus here
    # is the non-Docker code paths.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest --cov=src --cov-report=xml
