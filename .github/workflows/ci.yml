name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Required by tests/test_worker_node.py: those tests run the Node.js worker
      # (src/pfind/worker_node.cjs) through a real `node` process and skip when node
      # is absent, so without this step they would be silently skipped rather than run.
      # (pfind's own node *runtime* runs inside Docker, so end users don't need node
      # locally -- this is a dev/CI requirement only.)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Check formatting (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test
        run: uv run pytest
