name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # OIDC token for PyPI Trusted Publishing — no stored PyPI token needed.
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Build
        run: uv build

      - name: Publish to PyPI
        # Trusted Publishing via the OIDC token above (no stored credentials), and
        # generates + uploads PEP 740 attestations for the built artifacts by default.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
