repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses Python-specific YAML tags (!!python/...) that the safe
        # loader rejects; `mkdocs build` validates it instead.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Local hooks call the project's pinned ruff/mypy via uv, so the commit-time
  # checks match `make lint` / `make format` exactly (no bundled-tool drift).
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, auto-fix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
