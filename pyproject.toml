[project]
name = "pfind"
version = "0.1.0"
description = "Find files by describing them in natural language, with the generated filter sandboxed in Docker."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1",
    "pygments>=2",
    "typer>=0.12",
]

[project.scripts]
pfind = "pfind.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pfind"]
artifacts = [
    "src/pfind/Dockerfile.python",
    "src/pfind/Dockerfile.node",
    "src/pfind/worker_node.cjs",
]

[tool.hatch.build.targets.sdist]
include = ["src/pfind", "README.md"]

[dependency-groups]
dev = ["pytest>=8"]
